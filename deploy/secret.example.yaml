# secret.example.yaml — TEMPLATE de referência. Versionado sem valores reais.
#
# Como usar:
#   cp deploy/secret.example.yaml deploy/secret.yaml
#   # edite deploy/secret.yaml com os valores reais
#   kubectl apply -f deploy/secret.yaml -n camunda
#
# deploy/secret.yaml está no .gitignore — nunca será commitado.
#
# Para descobrir o IP do host (Ollama) a partir do Kind no WSL2:
#   ip route | grep default | awk '{print $3}'
apiVersion: v1
kind: Secret
metadata:
  name: camunda-aiops-secret
  namespace: camunda
type: Opaque
stringData:
  # URL do incoming webhook configurado no canal Teams
  TEAMS_WEBHOOK_URL: "https://SUBSTITUA.webhook.office.com/webhookb2/..."

  # Ollama roda no host WSL2 (fora do cluster Kind).
  # Use o IP da bridge Docker — estável, acessível de todos os pods Kind:
  #   ip addr show docker0 | awk '/inet / {split($2,a,"/"); print a[1]}'
  #   Geralmente: 172.17.0.1
  #
  # NÃO use o gateway padrão (ip route show default) — ele aponta para o
  # Windows Host, não para o WSL2 onde o Ollama roda.
  #
  # IMPORTANTE: Ollama deve escutar em 0.0.0.0, não só em 127.0.0.1:
  #   sudo EDITOR=vim systemctl edit ollama
  #   → adicione: [Service] / Environment="OLLAMA_HOST=0.0.0.0"
  #   sudo systemctl daemon-reload && sudo systemctl restart ollama
  OLLAMA_BASE_URL: "http://172.17.0.1:11434/v1"
  OLLAMA_MODEL: "qwen2.5:7b"

  LOG_LEVEL: "INFO"
  DEDUP_TTL_SECONDS: "300"
