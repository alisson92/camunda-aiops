name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + testes ───────────────────────────────────────────────────
  python:
    name: Python — lint e testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          # Cache das dependências instaladas pelo pip
          cache: "pip"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check agent/

      - name: Testes — pytest + cobertura
        run: pytest --cov --cov-report=term-missing
        # --cov usa [tool.coverage.run] do pyproject.toml (source=agent, fail_under=70)
        # O smoke test (test_teams_notifier.py) não tem funções test_* — ignorado pelo pytest.

  # ── YAML: sintaxe dos manifestos Kubernetes ────────────────────────────────
  yaml-lint:
    name: YAML — manifestos alerting/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: alerting/
          config_file: .yamllint.yml
