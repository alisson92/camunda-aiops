name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + testes ───────────────────────────────────────────────────
  python:
    name: Python — lint e testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache das dependências instaladas pelo pip
          cache: "pip"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check agent/

      - name: Testes — pytest
        run: pytest
        # O smoke test (test_teams_notifier.py) envia requests reais ao Teams
        # e não tem funções test_*, portanto o pytest o ignora automaticamente.

  # ── YAML: sintaxe dos manifestos Kubernetes ────────────────────────────────
  yaml-lint:
    name: YAML — manifestos alerting/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: alerting/
          config_file: .yamllint.yml
