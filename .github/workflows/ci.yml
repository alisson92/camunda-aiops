name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + testes ───────────────────────────────────────────────────
  python:
    name: Python — lint e testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache das dependências instaladas pelo pip
          cache: "pip"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check agent/

      - name: Testes — pytest + cobertura
        run: pytest --cov --cov-report=term-missing -m "not integration and not e2e"
        # -m "not integration and not e2e" exclui testes que requerem Docker — esses rodam nos jobs integration e e2e
        # fail_under=100 configurado em pyproject.toml: qualquer linha sem teste bloqueia o merge

  # ── Integração: Testcontainers (Prometheus real) ──────────────────────────
  integration:
    name: Integration — Testcontainers
    runs-on: ubuntu-latest
    needs: python  # só executa se os testes unitários passarem

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Testes de integração — Testcontainers
        run: pytest -m integration -v
        # Docker está disponível por padrão nos runners ubuntu-latest
        # O container Prometheus é criado/destruído automaticamente pelo testcontainers

  # ── E2E: ciclo completo (Prometheus real + LLM/Teams mock HTTP) ───────────
  e2e:
    name: E2E — ciclo completo
    runs-on: ubuntu-latest
    needs: integration  # garante que a integração com Prometheus passou primeiro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Testes E2E — ciclo completo
        run: pytest -m e2e -v
        # Prometheus real via Testcontainers + Ollama/Teams mockados via pytest-httpserver
        # Zero mocks em nível Python: todo o código do agente executa de verdade

  # ── Shell: análise estática dos scripts operacionais ──────────────────────
  shell-lint:
    name: Shell — shellcheck scripts/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # Falha apenas em warning ou acima — style/info são opcionais
          severity: warning
          scandir: scripts

  # ── YAML: sintaxe dos manifestos Kubernetes ────────────────────────────────
  yaml-lint:
    name: YAML — manifestos alerting/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: alerting/
          config_file: .yamllint.yml
